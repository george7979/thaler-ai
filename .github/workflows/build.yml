name: Build

on:
  push:
    branches: [dev, main]
    paths:
      - "src/**"
      - "src-tauri/**"
      - ".github/workflows/**"
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install cargo-deb
        run: cargo install cargo-deb --locked --force

      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Clean old .deb artifacts
        run: rm -rf src-tauri/target/debian/*.deb

      - name: Build .deb package
        working-directory: src-tauri
        run: cargo deb --no-build

      - name: Upload .deb
        uses: actions/upload-artifact@v4
        with:
          name: thaler-ai-linux-deb
          path: src-tauri/target/debian/*.deb
          retention-days: 30

  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            src-tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build release binary
        working-directory: src-tauri
        run: cargo build --release

      - name: Install cargo-wix
        run: cargo install cargo-wix --locked || true

      - name: Add WiX Toolset to PATH
        shell: bash
        run: echo "${WIX}bin" >> $GITHUB_PATH

      - name: Clean old .msi artifacts
        shell: bash
        run: rm -rf src-tauri/target/wix/*.msi

      - name: Build .msi installer
        working-directory: src-tauri
        run: cargo wix --no-build --nocapture

      - name: Upload .msi installer
        uses: actions/upload-artifact@v4
        with:
          name: thaler-ai-windows-msi
          path: src-tauri/target/wix/*.msi
          retention-days: 30

  dev-prerelease:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev'
    permissions:
      contents: write

    steps:
      - name: Download Linux .deb
        uses: actions/download-artifact@v4
        with:
          name: thaler-ai-linux-deb
          path: linux

      - name: Download Windows .msi
        uses: actions/download-artifact@v4
        with:
          name: thaler-ai-windows-msi
          path: installer

      - name: Delete old dev-latest release
        run: gh release delete dev-latest --yes --cleanup-tag || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update dev pre-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: dev-latest
          name: "Development Build"
          body: "Latest development build from dev branch. This is a pre-release."
          prerelease: true
          make_latest: false
          files: |
            linux/*.deb
            installer/*.msi

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from Cargo.toml
        id: version
        run: echo "ver=$(grep '^version' src-tauri/Cargo.toml | head -1 | sed 's/.*\"\(.*\)\"/\1/')" >> $GITHUB_OUTPUT

      - name: Create/move tag
        run: |
          git tag -f v${{ steps.version.outputs.ver }}
          git push origin v${{ steps.version.outputs.ver }} --force

      - name: Download Linux .deb
        uses: actions/download-artifact@v4
        with:
          name: thaler-ai-linux-deb
          path: linux

      - name: Download Windows .msi
        uses: actions/download-artifact@v4
        with:
          name: thaler-ai-windows-msi
          path: installer

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.ver }}
          files: |
            linux/*.deb
            installer/*.msi
          generate_release_notes: true
